services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    env_file: api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=18&charset=utf8
    depends_on:
      - database

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:${API_PORT:-8080}/api
    ports:
      - "${CLIENT_PORT:-80}:80"

  database:
    build:
      context: .
      dockerfile: scripts/database/Dockerfile
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - database:/var/lib/postgresql

  ingest:
    build:
      context: .
      dockerfile: scripts/ingest/Dockerfile
    volumes:
      - ./data:/data
    environment:
      INCOMING_DIR: /data/incoming
      ARCHIVED_DIR: /data/archived
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - database

volumes:
  database:
