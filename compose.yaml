services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@database/${POSTGRES_DB:-geotensions}?serverVersion=18&charset=utf8
    ports:
      - "8080:8080"
    depends_on:
      - database

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "80:80"

  database:
    build:
      context: .
      dockerfile: scripts/database/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geotensions}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - database:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-geotensions}
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  ingest:
    build:
      context: .
      dockerfile: scripts/ingest/Dockerfile
    env_file: scripts/ingest/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@database/${POSTGRES_DB:-geotensions}
    volumes:
      - ./data:/data
    ports:
      - "5050:5050"
    depends_on:
      database:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  database:
